[pytest]
# Pytest 配置文件

# 最小 Python 版本
minversion = 7.0

# 测试发现配置
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = tests

# 异步模式
asyncio_mode = auto

# 标记定义
markers =
    asyncio: 异步测试
    slow: 慢速测试
    integration: 集成测试
    unit: 单元测试
    middleware: 中间件测试
    tool: 工具系统测试
    config: 配置系统测试

# 覆盖率配置
[coverage:run]
source = closeclaw
branch = True

# 覆盖率省略
omit =
    */tests/*
    */site-packages/*
    */__main__.py
    */setup.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
skip_empty = True

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

[coverage:html]
directory = htmlcov

# 输出选项
addopts = 
    -ra
    --strict-markers
    --strict-config
    --tb=short
    -p no:warnings
