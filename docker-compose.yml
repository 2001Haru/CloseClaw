services:
  closeclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_EXTRAS: ${INSTALL_EXTRAS:-[providers]}
    image: ${CLOSECLAW_IMAGE:-closeclaw:local}
    container_name: closeclaw-gateway
    command: ["gateway", "--config", "/app/config.yaml"]
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      WORKSPACE_ROOT: /workspace
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./workspace:/workspace
      - ./runtime-data:/runtime-data
    ports:
      - "${GATEWAY_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD-SHELL", "closeclaw provider --config /app/config.yaml --json > /dev/null 2>&1 || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-5s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-20s}
    mem_limit: ${GATEWAY_MEM_LIMIT:-1g}
    cpus: ${GATEWAY_CPUS:-1.00}

  closeclaw-cli:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_EXTRAS: ${INSTALL_EXTRAS:-[providers]}
    image: ${CLOSECLAW_IMAGE:-closeclaw:local}
    profiles:
      - cli
    command: ["agent", "--config", "/app/config.yaml"]
    restart: "no"
    init: true
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      WORKSPACE_ROOT: /workspace
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./workspace:/workspace
      - ./runtime-data:/runtime-data
    healthcheck:
      test: ["CMD", "closeclaw", "--help"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-5s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: ${HEALTHCHECK_START_PERIOD:-20s}
    mem_limit: ${CLI_MEM_LIMIT:-768m}
    cpus: ${CLI_CPUS:-1.00}
    stdin_open: true
    tty: true
